name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit and API tests
        run: python -m pytest -q -m "not e2e" --ignore=tests/test_integration_db.py

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finalproject_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finalproject_db
      JWT_SECRET_KEY: ci-test-secret-key-32-chars-minimum
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run database integration tests
        run: python -m pytest -q tests/test_integration_db.py

  e2e-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finalproject_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finalproject_db
      JWT_SECRET_KEY: ci-test-secret-key-32-chars-minimum
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:8015
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Start FastAPI app
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8015 &
          echo $! > /tmp/uvicorn.pid

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8015/health; then
              echo "App is ready"
              exit 0
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 2
          done
          echo "App did not become ready in time"
          exit 1

      - name: Run Playwright E2E tests
        run: python -m pytest -q -m e2e

      - name: Stop FastAPI app
        if: always()
        run: |
          if [ -f /tmp/uvicorn.pid ]; then
            kill "$(cat /tmp/uvicorn.pid)" || true
          fi
